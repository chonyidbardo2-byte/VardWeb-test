<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Newsletter Broadcast Email — Design Preview</title>
<style>
  body {
    margin: 0; padding: 40px 24px 80px; background: #05060a;
    font-family: -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    color: #eef0f8;
  }
  h2 {
    max-width: 640px; margin: 0 auto 12px; font-size: 15px; font-weight: 700;
    letter-spacing: 0.02em; color: #9AA3B8;
  }
  .frame-wrap { max-width: 640px; margin: 0 auto 56px; }
  iframe {
    display: block; width: 100%; height: 600px; border: 1px solid rgba(0,229,255,0.14);
    border-radius: 12px; background: #070910;
  }
</style>
</head>
<body>

  <h2>Example A &mdash; new post announcement</h2>
  <div class="frame-wrap"><iframe id="frame-a" title="Broadcast preview A"></iframe></div>

  <h2>Example B &mdash; longer post w/ heading + list</h2>
  <div class="frame-wrap"><iframe id="frame-b" title="Broadcast preview B"></iframe></div>

  <script src="blog-newsletter-broadcast.js"></script>
  <script>
    var exampleA = {
      subject: 'We just shipped a big redesign & new pricing',
      bodyHtml: [
        '<p style="margin:0 0 14px;">Hey there,</p>',
        '<p style="margin:0 0 14px;">We just launched a full redesign of our web design pricing tiers &mdash; clearer scope, sharper add-ons, and a Custom tier for anything in between.</p>',
        '<p style="margin:0;"><a href="https://vardweb.com/web-design.html" style="color:#00E5FF;text-decoration:underline;">See the new tiers &rarr;</a></p>',
      ].join(''),
    };

    var exampleB = {
      subject: '5 things to check before launching your site',
      bodyHtml: [
        '<p style="margin:0 0 14px;">A quick pre-launch checklist we send every client:</p>',
        '<h2 style="margin:0 0 10px;font-family:\'JetBrains Mono\',monospace;font-size:16px;color:#EEF0F8;">The checklist</h2>',
        '<ul style="margin:0 0 14px;padding-left:20px;">',
          '<li style="margin-bottom:6px;">Mobile responsiveness on 3+ devices</li>',
          '<li style="margin-bottom:6px;">Contact form actually sends</li>',
          '<li style="margin-bottom:6px;">Favicon + meta tags set</li>',
          '<li>Analytics installed</li>',
        '</ul>',
        '<p style="margin:0;">Read the full breakdown on <a href="https://vardweb.com/blog.html" style="color:#00E5FF;text-decoration:underline;">the blog &rarr;</a></p>',
      ].join(''),
    };

    function renderInto(id, data) {
      var frame = document.getElementById(id);
      frame.addEventListener('load', function () {
        var doc = frame.contentDocument;
        frame.style.height = (doc.documentElement.scrollHeight + 24) + 'px';
      });
      frame.srcdoc = window.buildNewsletterBroadcastHtml(data);
    }

    renderInto('frame-a', exampleA);
    renderInto('frame-b', exampleB);
  </script>

</body>
</html>
